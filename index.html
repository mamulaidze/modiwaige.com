      content="იპოვეთ უფასო ნივთები საქართველოში, დაჯავშნეთ ახლომდებარე განცხადებები და გააჩუქეთ ნივთები, რომლებიც სხვას გამოადგება."

    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#2f6f49" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const savedTheme = localStorage.getItem('gaachuqe-theme');
        const systemTheme = matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light';
        const theme =
          savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : systemTheme;

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', theme === 'dark' ? '#171c1a' : '#f8f5ed');
      })();
    </script>
    <title>Gaachuqe - უფასო ნივთები საქართველოში | Free giving in Georgia</title>

  </body>
